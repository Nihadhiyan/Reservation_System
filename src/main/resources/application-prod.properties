# ===============================
# PROD Profile Configuration
# ===============================

# PostgreSQL Configuration with strict SSL/TLS encryption enforced
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/bookfairdb?sslmode=require
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:bookfair_app}
spring.datasource.password=${POSTGRES_PASSWORD}

# H2 Console explicitly disabled in production
spring.h2.console.enabled=false

# JPA/Hibernate Configuration (PROD) - show-sql strictly disabled to prevent query/parameter leakage
# Production databases must NEVER auto-update via Hibernate; strictly validate against Flyway migrations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ===============================
# Flyway Migration Configuration
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

