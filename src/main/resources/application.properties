spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# PII Security Configuration
# ===============================
app.security.pii-secret=${PII_SECRET_KEY:0123456789abcdef0123456789abcdef}

# ===============================
# Default Database & JPA Settings (DEV Profile Fallback)
# Note: For PROD profile (application-prod.properties), SSL/TLS is enforced (?sslmode=require),
# H2 console is disabled, and show-sql is strictly disabled.
# ===============================
spring.datasource.url=${DB_URL:jdbc:h2:mem:bookfairdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:password}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.jpa.database-platform=${JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}
spring.jpa.defer-datasource-initialization=${DEFER_INIT:false}
spring.sql.init.mode=${SQL_INIT_MODE:always}

# ===============================
# Server Configuration
# ===============================
server.port=4000

# ===============================
# Jackson Configuration
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# Email Configuration
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pvtchins@gmail.com
spring.mail.password=${SMTP_PW}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# Redis Configuration
# ===============================
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# Stripe & App Configuration
# ===============================
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
app.jwt-secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ===============================
# Flyway Migration Configuration
# ===============================
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE:true}
spring.flyway.locations=classpath:db/migration

# ===============================
# Observability & Monitoring (Actuator + Prometheus + HikariCP)
# ===============================
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# HikariCP Connection Pool Monitoring (Track slow queries, deadlocks, and pool utilization)
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.pool-name=BookFairHikariCP
spring.datasource.hikari.leak-detection-threshold=2000