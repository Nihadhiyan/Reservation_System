spring.application.name=backend

# ===============================
# H2 Database Configuration (DEV)
# ===============================
spring.datasource.url=jdbc:h2:mem:bookfairdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# PostgreSQL Configuration (PROD)
# ===============================
# spring.datasource.url=jdbc:postgresql://localhost:5432/bookfairdb
# spring.datasource.username=postgres
# spring.datasource.password=admin

# ===============================
# JPA/Hibernate Configuration
# ===============================
# Note: Change to org.hibernate.dialect.PostgreSQLDialect when switching to Postgres
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===============================
# Server Configuration
# ===============================
server.port=4000

# ===============================
# Email Configuration
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pvtchins@gmail.com
spring.mail.password=${SMTP_PW}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# Redis Configuration
# ===============================
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# Stripe Configuration
# ===============================
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}