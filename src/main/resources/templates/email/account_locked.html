<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Account Locked</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            margin: auto;
        }

        .header {
            color: #d9534f;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .content {
            font-size: 16px;
            color: #333333;
            line-height: 1.5;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777777;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Security Alert: Account Locked</div>
        <div class="content">
            <p>Hello <span th:text="${userName}">User</span>,</p>
            <p>We detected multiple failed login attempts on your account. For your protection, we have temporarily
                locked your account.</p>
            <p>If you did not initiate this, please contact support immediately.</p>
        </div>
        <div class="footer">
            &copy; Clausis Technologies. All rights reserved.
        </div>
    </div>
</body>

</html>
