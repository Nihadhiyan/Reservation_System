<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Password Changed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            margin: auto;
        }

        .header {
            color: #5cb85c;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .content {
            font-size: 16px;
            color: #333333;
            line-height: 1.5;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777777;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Password Successfully Changed</div>
        <div class="content">
            <p>Hello <span th:text="${userName}">User</span>,</p>
            <p>Your password has been successfully updated. You can now use your new password to log in.</p>
            <p>If you did not perform this action, please contact our support team immediately to secure your account.
            </p>
        </div>
        <div class="footer">
            &copy; Clausis Technologies. All rights reserved.
        </div>
    </div>
</body>

</html>
